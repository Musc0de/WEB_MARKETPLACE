<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow,nosnippet">
    <title>Akses Ditolak | StarSuperScare</title>
    <style>
    :root {
      --bg: #0f172a;
      --text: #f8fafc;
      --accent: #3b82f6;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
        sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 90%;
      width: 500px;
    }
    h1 {
      font-size: 8rem;
      margin: 0;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    h2 {
      font-size: 1.5rem;
      margin-top: 1rem;
      font-weight: 600;
    }
    p {
      color: #94a3b8;
      margin-top: 0.5rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background-color: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 9999px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background-color: #2563eb;
      transform: translateY(-2px);
    }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Halaman Tidak Ditemukan</h2>
      <p>Endpoint API ini diproteksi dan tidak dapat diakses secara langsung melalui peramban.</p>
      <a href="/" class="btn">Kembali ke Beranda</a>
    </div>
  </body>
</html>
