name: CI

on:
  push:
    branches:
      - main
      - development
      - staging
  pull_request:
    branches:
      - main
      - development
      - staging

jobs:
  foundation-gate:
    name: Foundation Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format Check
        run: deno fmt --check

      - name: Lint Check
        run: deno lint

      - name: Type Check
        run: deno task check

      - name: Unit Tests
        run: deno task test

      - name: Frontend Build
        run: deno task build:frontends
